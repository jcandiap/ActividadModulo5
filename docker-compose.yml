version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aerofly_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aerofly
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - aerofly_network

  app:
    build: .
    container_name: aerofly_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - aerofly_network

networks:
  aerofly_network:
    driver: bridge

volumes:
  db_data: